const Warn  = p => <Svg {...p}><path d="M10.3 3.3 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.3a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4M12 17h.01"/></Svg>;

const ChevDown = p => <Svg w={2.4} {...p}><path d="M6 9l6 6 6-6"/></Svg>;

// ── 定数 ──────────────────────────────────────────
const STATUSES = ["未着手","進行中","完了"];

// ライトテーマ：淡い背景＋濃い文字＋ドット。bar=カード左帯、border=ピル枠線

};

const today = () => new Date().toISOString().split("T")[0];
const fmtDate = d => { if(!d) return ""; const dt=new Date(d+"T00:00:00"); return `${dt.getMonth()+1}/${dt.getDate()}`; };

};
// ソート用：期間指定はdateFrom、候補日は最も早い候補日。日付未設定は末尾に回す
const sortDate = task => {

  return days.length ? days[0] : "9999-12-31";
};

const DEMO = [
  {id:1,siteName:"山田工務店 第1現場",detail:"3Fトイレの配管を交換する",status:"進行中",workers:"3〜4人",dateMode:"期間指定",dateFrom:today(),dateTo:"",candidateDates:[],createdAt:Date.now()-86400000},
  {id:2,siteName:"ABC建設 北棟",detail:"北側足場の安全点検を実施",status:"未着手",workers:"2人",dateMode:"候補日",dateFrom:"",dateTo:"",candidateDates:[today(),""],createdAt:Date.now()-3600000},
];

// スタイル定数（ライトテーマ）
const IS = {width:"100%",background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:11,color:"#0f172a",padding:"12px 13px",fontSize:15,fontWeight:600,boxSizing:"border-box",fontFamily:"inherit"};

// ── ローカル音声解析（APIキー不要・オフライン動作） ────────
// 話した内容をブラウザ内のルールベース解析で構造化する（課金なし）
const WD = {"日":0,"月":1,"火":2,"水":3,"木":4,"金":5,"土":6};
const pad2 = n => String(n).padStart(2,"0");
const ymd = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const dayStart = d => { const x=new Date(d); x.setHours(0,0,0,0); return x; };

// 日付を絞り込む正規表現（具体的なものを先に並べる）
const DATE_RE = /(?:今週|来週|再来週|次の週)?[日月火水木金土]曜日?|明々後日|しあさって|明後日|あさって|明日|あした|今日|本日|今月\d{1,2}日|来月\d{1,2}日|\d{1,2}月\d{1,2}日|\d{1,2}[\/／]\d{1,2}|\d{1,2}日/g;

// 1つの日付表現を YYYY-MM-DD に変換。refDate（範囲の開始日）があれば素の曜日をその週で解決
function resolveDateToken(tok, base, refDate){
  base = dayStart(base||new Date());
  tok = (tok||"").trim();
  let m;
  if(/今日|本日/.test(tok)) return ymd(base);
  if(/明々後日|しあさって/.test(tok)) return ymd(addDays(base,3));
  if(/明後日|あさって/.test(tok)) return ymd(addDays(base,2));
  if(/明日|あした/.test(tok)) return ymd(addDays(base,1));
  if(m=tok.match(/今月(\d{1,2})日/)) return ymd(new Date(base.getFullYear(),base.getMonth(),+m[1]));
  if(m=tok.match(/来月(\d{1,2})日/)) return ymd(new Date(base.getFullYear(),base.getMonth()+1,+m[1]));
  if(m=tok.match(/(\d{1,2})月(\d{1,2})日/)){ let d=new Date(base.getFullYear(),+m[1]-1,+m[2]); if(d<base) d=new Date(base.getFullYear()+1,+m[1]-1,+m[2]); return ymd(d); }
  if(m=tok.match(/(\d{1,2})[\/／](\d{1,2})/)){ let d=new Date(base.getFullYear(),+m[1]-1,+m[2]); if(d<base) d=new Date(base.getFullYear()+1,+m[1]-1,+m[2]); return ymd(d); }
  if(m=tok.match(/(今週|来週|再来週|次の週)?\s*([日月火水木金土])曜/)){
    const prefix=m[1], targetDow=WD[m[2]];
    const ref = refDate ? dayStart(new Date(refDate+"T00:00:00")) : base;
    const thisMonday = addDays(ref, -((ref.getDay()+6)%7));  // その週の月曜
    const wdOff = (targetDow+6)%7;                            // 月曜からの曜日オフセット
    if(prefix) return ymd(addDays(thisMonday, (prefix==="再来週"?2:1)*7 + wdOff));
    if(refDate) return ymd(addDays(thisMonday, wdOff));        // 範囲の終了日（開始日と同じ週）
    const diff = (targetDow - base.getDay() + 7)%7;            // 単独の曜日：次の該当日
    return ymd(addDays(base, diff));
  }
  if(m=tok.match(/(\d{1,2})日/)){ let d=new Date(base.getFullYear(),base.getMonth(),+m[1]); if(d<base) d=new Date(base.getFullYear(),base.getMonth()+1,+m[1]); return ymd(d); }
  return null;
}

// テキストから日付だけ抽出（期間指定/候補日を自動判定）。日付フィールドの音声入力でも使う
function extractDates(text, base){
  base = base || new Date();
  const res = {dateMode:"", dateFrom:"", dateTo:"", candidateDates:[]};
  const dm = [...text.matchAll(DATE_RE)];
  if(dm.length===0) return res;
  // 「○月○日 から ○月○日」のように2つの日付が範囲マーカーで繋がった時だけ期間指定
  if(dm.length>=2){
    const between = text.slice(dm[0].index+dm[0][0].length, dm[1].index);
    if(/から|〜|～|~|まで/.test(between)){
      res.dateMode="期間指定";
      res.dateFrom = resolveDateToken(dm[0][0], base) || "";
      res.dateTo   = resolveDateToken(dm[1][0], base, res.dateFrom) || "";
      return res;
    }
  }
  // それ以外（単一の日付・範囲マーカーなしの複数）は候補日に入れる
  res.dateMode="候補日";
  res.candidateDates = dm.map(x=>resolveDateToken(x[0], base)).filter(Boolean);
  return res;
}

// ラベル指定の解析。「現場名 ○○ 人数 3人 日付 来週月曜 作業内容 配管交換」のように
// 項目名を区切りとして話した場合、その直後の語を各項目に割り当てる。
// 明示ラベルが無ければ null を返し、従来の自動推定にフォールバックする。
function parseVoiceLabeled(text){
  const base = new Date();
  // 明示ラベル（フィールド名）が1つでもあればラベルモードに入る
  const STRONG = /(現場名|物件名|作業内容|人数|人員|日付|日にち|日程|期間|予定日|メモ|備考)/;
  if(!STRONG.test(text)) return null;
  // 区切りとして認識する語（長いものを先に＝「現場名」を「現場」より優先）
  const SPLIT = /(作業内容|現場名|物件名|予定日|日にち|現場|物件|場所|人数|人員|日付|日程|期間|予定|作業|内容|メモ|備考)/g;
  const keyOf = kw => {
    if(/現場名|現場|物件名|物件|場所/.test(kw)) return "siteName";
    if(/人数|人員/.test(kw))                    return "workers";
    if(/日付|日にち|日程|期間|予定日|予定/.test(kw)) return "date";
    return "detail"; // 作業内容 / 作業 / 内容 / メモ / 備考
  };
  const marks=[]; let m;
  while(m=SPLIT.exec(text)){ marks.push({key:keyOf(m[0]), start:m.index, end:m.index+m[0].length}); }
  if(!marks.length) return null;

  const out={siteName:"",detail:"",workers:"",dateMode:"期間指定",dateFrom:"",dateTo:"",candidateDates:[]};
  const details=[];
  const clean = s => s.replace(/^[はがをにのへとや、。・：:\s　]+/,"").replace(/[、。・\s　]+$/,"").trim();
  // 最初のラベルより前に話した語があれば現場名の候補にする（先に現場名を言うケース）
  const pre = clean(text.slice(0, marks[0].start));
  for(let i=0;i<marks.length;i++){
    const seg = text.slice(marks[i].end, i+1<marks.length ? marks[i+1].start : text.length);
    const val = clean(seg);
    if(!val) continue;
    const key=marks[i].key;
    if(key==="siteName"){ out.siteName = out.siteName ? out.siteName+" "+val : val; }
    else if(key==="workers"){
      const wm=val.match(/\d+\s*(?:[〜～~ー－\-]|から)\s*\d+\s*人(?:程度|くらい|ぐらい|ほど)?|\d+\s*人(?:程度|くらい|ぐらい|ほど)?|数人|複数人|大勢/);
      out.workers = wm ? wm[0].replace(/\s/g,"").replace(/から/,"〜") : val;
    }
    else if(key==="date"){
      const d=extractDates(val, base);
      if(d.dateMode){ out.dateMode=d.dateMode; out.dateFrom=d.dateFrom; out.dateTo=d.dateTo; out.candidateDates=d.candidateDates; }
    }
    else { details.push(val); }
  }
  if(!out.siteName && pre) out.siteName = pre;
  out.detail = details.join(" ");
  return out;
}

// 音声テキストをローカルで解析してフォーム用オブジェクトを返す
function parseVoiceLocal(text){
  const labeled = parseVoiceLabeled(text);   // ラベル指定があれば優先
  if(labeled) return labeled;
  const base = new Date();
  const out = {siteName:"",detail:"",workers:"",dateMode:"期間指定",dateFrom:"",dateTo:"",candidateDates:[]};
  const ranges = []; // 抽出済み範囲（作業内容抽出時に除外する）

  // 人数（「3から4人」「2〜3人」「5人程度」など。範囲の「から」も拾い、表示は〜に統一）
  const wm = text.match(/\d+\s*(?:[〜～~ー－\-]|から)\s*\d+\s*人(?:程度|くらい|ぐらい|ほど)?|\d+\s*人(?:程度|くらい|ぐらい|ほど)?|数人|複数人|大勢/);
  if(wm){ out.workers = wm[0].replace(/\s/g,"").replace(/から/,"〜"); ranges.push([wm.index, wm.index+wm[0].length]); }

  // 現場名（マンション種別・社名キーワード優先 → 「〜の現場」 → 後段で最初の語を採用）
  //  現場名はほぼマンション名。固有名（サーパス等）は接尾語が無いので最初の語ルールで拾う
  let sm = text.match(/[^\s、。]*?(?:マンション|ハイツ|コーポ|レジデンス|メゾン|ハイム|パレス|ヒルズ|ハウス|ホーム|建設|工務店|工業|興業|土建|開発|住建|組)[^\s、。]*/);
  if(sm){ out.siteName = sm[0]; ranges.push([sm.index, sm.index+sm[0].length]); }
  else if(sm = text.match(/([^\s、。]+?)の現場/)){ out.siteName = sm[1]; ranges.push([sm.index, sm.index+sm[0].length]); }

  // 日付：「○月○日 から ○月○日」のように範囲マーカーで繋がった時だけ期間指定。
  //        単一の日付・範囲マーカーなしの複数は候補日に入れる。
  const dm = [...text.matchAll(DATE_RE)];
  if(dm.length>=1){
    let isRange=false;
    if(dm.length>=2){
      const between = text.slice(dm[0].index+dm[0][0].length, dm[1].index);
      isRange = /から|〜|～|~|まで/.test(between);
    }
    if(isRange){                                      // 期間指定
      out.dateMode="期間指定";
      out.dateFrom = resolveDateToken(dm[0][0], base) || "";
      out.dateTo   = resolveDateToken(dm[1][0], base, out.dateFrom) || "";
      let rEnd = dm[1].index+dm[1][0].length;
      if(text.slice(rEnd, rEnd+2)==="まで") rEnd+=2; // 末尾の「まで」も除外
      ranges.push([dm[0].index, rEnd]);
    }else{                                            // 候補日（単一含む）
      out.dateMode="候補日";
      out.candidateDates = dm.map(x=>resolveDateToken(x[0], base)).filter(Boolean);
      ranges.push([dm[0].index, dm[dm.length-1].index+dm[dm.length-1][0].length]);
    }
  }

  // 作業内容：抽出済み範囲を伏せ字にして、残り全部を内容として採用
  const chars = text.split("");
  ranges.forEach(([s,e])=>{ for(let i=s;i<e;i++) chars[i]=" "; });
  let segs = chars.join("").split(/[ 、。,.\s　]+/)
    .map(s=>s.replace(/現場/g,"").replace(/^[のでをにはがとへやも・「」]+/,"").replace(/[のでをにはがとへやも・「」]+$/,"").trim())
    .filter(Boolean);
  // 現場名が未検出なら、最初に話した語を現場名とみなす（「○○の現場」と言わなくてもOK）
  if(!out.siteName && segs.length){ out.siteName = segs.shift(); }
  out.detail = segs.join(" ");

  return out;
}

// ── 単一フィールド用の音声入力ボタン（マイク） ──────────────
// 1発話で確定させ、結果テキストを onText で親に返す（重複防止のため単発認識）
function MicButton({onText}){
  const [rec, setRec] = useState(false);
  const ref = useRef(null);
  const start = () => {
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ alert("このブラウザは音声入力に未対応です"); return; }
    const r = new SR(); r.lang="ja-JP"; r.continuous=false; r.interimResults=false;
    r.onresult = e => {
      let t=""; for(let i=0;i<e.results.length;i++) if(e.results[i].isFinal) t+=e.results[i][0].transcript;
      t=t.trim(); if(t) onText(t);
    };
    r.onerror = ()=> setRec(false);
    r.onend   = ()=> setRec(false);
    ref.current=r; r.start(); setRec(true);
  };
  const stop = ()=>{ if(ref.current) ref.current.stop(); setRec(false); };
  return (
    <button type="button" onClick={rec?stop:start}
      style={{background:rec?"#fef2f2":"#fff7ed",border:`1.5px solid ${rec?"#fca5a5":"#fdba74"}`,borderRadius:999,padding:"5px 12px",color:rec?"#dc2626":ORANGE,fontSize:12,fontWeight:800,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5,flexShrink:0}}>
      {rec
        ? <><span style={{width:7,height:7,borderRadius:"50%",background:"#dc2626",animation:"pulse 1s infinite",display:"inline-block"}}/>停止</>
        : <><Mic s={13} c={ORANGE} w={2.2}/>音声</>}
    </button>
  );
}

// ── メインアプリ ──────────────────────────────────
function App() {
  const [tasks, setTasksRaw] = useState(() => loadTasks() || DEMO);
  const setTasks = ts => { setTasksRaw(ts); saveTasks(ts); };

  const [showForm, setShowForm]     = useState(false);
  const [filterStatus, setFilter]   = useState("全て");
  const [form, setForm]             = useState(emptyForm());
  const [detailOpen, setDetailOpen] = useState(null);
  const [editId, setEditId]         = useState(null);

  // 通常の作業内容音声入力
  const [recording, setRecording]   = useState(false);
  const [transcript, setTranscript] = useState("");
  const [recError, setRecError]     = useState("");
  const recRef = useRef(null);

  // AI一括音声入力
  const [aiRec, setAiRec]           = useState(false);      // 録音中
  const [aiText, setAiText]         = useState("");          // 文字起こし途中
  const [aiParsing, setAiParsing]   = useState(false);      // AI処理中
  const [aiError, setAiError]       = useState("");
  const [aiPreview, setAiPreview]   = useState(null);       // 解析結果プレビュー
  const aiRecRef  = useRef(null);
  const aiStopRef = useRef(false);  // ユーザーが停止を押したか（自動再開の制御）
  const aiAccRef  = useRef("");     // セッションをまたいで蓄積する確定テキスト

  const nextId = useRef(Math.max(...(loadTasks()||DEMO).map(x=>x.id), 99)+1);
  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  // 各フィールドの音声入力：既存の値があれば空白を挟んで追記
  const appendF = (k,t) => setForm(f=>({...f,[k]:(f[k]?f[k]+" ":"")+t}));
  // 日付フィールドの音声入力：話した内容から日付を解析して反映
  const applyDateSpeech = t => {
    const d = extractDates(t);
    if(!d.dateMode){ return; }
    setForm(f=>{
      if(d.dateMode==="候補日") return {...f,dateMode:"候補日",candidateDates:d.candidateDates.length?d.candidateDates:[""]};
      return {...f,dateMode:"期間指定",dateFrom:d.dateFrom||f.dateFrom,dateTo:d.dateTo||""};
    });
  };

  // 候補日操作
  const setCandDate = (i,v) => { const a=[...(form.candidateDates||[])]; a[i]=v; setF("candidateDates",a); };
  const addCandDate = () => setF("candidateDates",[...(form.candidateDates||[]),""]); 
  const rmCandDate  = i => { const a=[...(form.candidateDates||[])]; a.splice(i,1); setF("candidateDates",a); };

  // 通常音声（作業内容欄）
  const startRec = () => {
    setRecError("");
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setRecError("このブラウザは音声入力に未対応です");return;}
    const rec=new SR(); rec.lang="ja-JP"; rec.continuous=false; rec.interimResults=true;
    let finalText="";
    rec.onresult=e=>{
      // 毎回 全結果から組み立て直す（同じ語が重複加算されるのを防ぐ）
      let interim=""; finalText="";
      for(let i=0;i<e.results.length;i++){
        const t=e.results[i][0].transcript;
        if(e.results[i].isFinal) finalText+=t; else interim+=t;
      }
      setTranscript(finalText+interim);
    };
    rec.onerror=e=>{setRecError("音声エラー: "+e.error);setRecording(false);};
    rec.onend=()=>{
      setRecording(false);
      const t=finalText.trim();
      if(t) setForm(f=>({...f,detail:f.detail+(f.detail?"　":"")+t}));
      setTranscript("");
    };
    recRef.current=rec; rec.start(); setRecording(true);
  };
  const stopRec = () => { recRef.current?.stop(); setRecording(false); };

  // AI一括音声録音
  // スマホ(Android/iOSのChrome)は continuous=true だと確定語を何度も再報告して
  // 「現場現場現場…」のように重複する。対策として continuous=false（1発話ごと）にし、
  // ユーザーが停止するまで onend で自動再開して長文に対応する。
  const startAiRec = () => {
    setAiError(""); setAiText(""); setAiPreview(null);
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setAiError("このブラウザは音声入力に未対応です");return;}
    aiStopRef.current=false; aiAccRef.current="";

    const launch = () => {
      const rec=new SR(); rec.lang="ja-JP"; rec.continuous=false; rec.interimResults=true;
      let seg="";  // このセッションの確定テキスト
      rec.onresult=e=>{
        let interim=""; seg="";
        for(let i=0;i<e.results.length;i++){
          const t=e.results[i][0].transcript;
          if(e.results[i].isFinal) seg+=t; else interim+=t;
        }
        setAiText((aiAccRef.current+seg+interim).trim());
      };
      rec.onerror=e=>{
        if(e.error==="no-speech"||e.error==="aborted") return; // 無音・中断は無視して再開に任せる
        aiStopRef.current=true; setAiError("音声エラー: "+e.error);
      };
      rec.onend=()=>{
        aiAccRef.current += seg;                       // 確定分を蓄積
        if(!aiStopRef.current){                         // 停止していなければ続けて聞く
          try{ const r=launch(); aiRecRef.current=r; r.start(); return; }catch(_){}
        }
        setAiRec(false);
        const text=aiAccRef.current.trim();
        if(!text){setAiError("音声が認識できませんでした");return;}
        setAiParsing(true);
        try{ setAiPreview(parseVoiceLocal(text)); }
        catch(e){ setAiError("解析エラー: "+e.message); }
        finally{ setAiParsing(false); }
      };
      return rec;
    };

    try{ aiRecRef.current=launch(); aiRecRef.current.start(); setAiRec(true); }
    catch(e){ setAiError("音声を開始できませんでした: "+e.message); }
  };
  const stopAiRec = () => { aiStopRef.current=true; if(aiRecRef.current) aiRecRef.current.stop(); };

  // プレビューを採用してフォームに反映
  const applyAiPreview = () => {
    if(!aiPreview) return;
    const p=aiPreview;
    setForm({
      siteName:  p.siteName||"",
      detail:    p.detail||"",
      workers:   p.workers||"",
      dateMode:  p.dateMode==="候補日"?"候補日":"期間指定",
      dateFrom:  p.dateFrom||today(),
      dateTo:    p.dateTo||"",
      candidateDates: (p.candidateDates||[]).length>0 ? p.candidateDates : [""],
    });
    setAiPreview(null); setAiText(""); setShowForm(true); setEditId(null);
  };

  const canSubmit = !!(form.siteName.trim() || form.detail.trim());
  const handleSubmit = () => {
    if(!canSubmit) return;
    if(editId!==null){
      setTasks(tasks.map(t=>t.id===editId?{...t,...form}:t)); setEditId(null);
    }else{
      setTasks([...tasks,{...form,id:nextId.current++,status:"未着手",createdAt:Date.now()}]);
    }
    setForm(emptyForm()); setShowForm(false); setTranscript("");
  };

  const handleEdit = task => {
    setForm({siteName:task.siteName||"",detail:task.detail||"",workers:task.workers||"",dateMode:task.dateMode||"期間指定",dateFrom:task.dateFrom||"",dateTo:task.dateTo||"",candidateDates:task.candidateDates||[""]});
    setEditId(task.id); setShowForm(true); setDetailOpen(null);
  };
  const handleDelete = id => { setTasks(tasks.filter(t=>t.id!==id)); setDetailOpen(null); };
  const handleStatus = (id,s) => setTasks(tasks.map(t=>t.id===id?{...t,status:s}:t));

  const filtered = tasks.filter(t=>filterStatus==="全て"||t.status===filterStatus)
    .sort((a,b)=>{ const d=sortDate(a).localeCompare(sortDate(b)); return d!==0?d:b.createdAt-a.createdAt; });
  const counts = STATUSES.reduce((acc,s)=>({...acc,[s]:tasks.filter(t=>t.status===s).length}),{});

  // ── レンダリング ──────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"#f4f6f8"}}>

      {/* ヘッダー */}
      <div style={{background:"#fff",borderBottom:"1px solid #eef1f5",padding:"13px 18px",paddingTop:"calc(13px + env(safe-area-inset-top,0px))",position:"sticky",top:0,zIndex:50,boxShadow:"0 1px 3px rgba(15,23,42,.04)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,background:ORANGE,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <Svg s={21} c="#fff" w={2.3}><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></Svg>
            </div>
            <div>
              <div style={{fontSize:17,fontWeight:800,color:"#0f172a",lineHeight:1.1}}>現場タスク管理</div>
              <div style={{fontSize:11,color:"#94a3b8",letterSpacing:"0.12em",fontWeight:600,marginTop:2}}>GENBA TASK MANAGER</div>
            </div>
          </div>
          <button onClick={()=>{setForm(emptyForm());setEditId(null);setShowForm(true);}}
            style={{background:ORANGE,color:"#fff",border:"none",borderRadius:11,padding:"9px 15px",fontWeight:800,fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
            <Plus s={16} c="#fff"/>追加
          </button>
        </div>
      </div>

      {/* AI一括音声入力パネル（常時表示） */}
      <div style={{margin:"14px 16px 0",background:"#fff",border:`1.5px solid ${aiRec?"#fca5a5":"#fed7aa"}`,borderRadius:16,padding:"14px 16px",boxShadow:"0 1px 2px rgba(234,88,12,.05)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{fontSize:14,fontWeight:800,color:ORANGE,display:"flex",alignItems:"center",gap:7}}><Mic s={17} c={ORANGE} w={2.2}/>音声で一括登録</div>
          <button onClick={aiRec?stopAiRec:startAiRec} disabled={aiParsing}
            style={{background:aiRec?"#fef2f2":aiParsing?"#f1f5f9":ORANGE,border:`1.5px solid ${aiRec?"#fca5a5":aiParsing?"#e2e8f0":ORANGE}`,borderRadius:999,padding:"7px 15px",color:aiRec?"#dc2626":aiParsing?"#94a3b8":"#fff",fontSize:13,fontWeight:800,cursor:aiParsing?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
            {aiParsing
              ? <><span className="spinner"/> 解析中…</>
              : aiRec
                ? <><span style={{width:8,height:8,borderRadius:"50%",background:"#dc2626",animation:"pulse 1s infinite",display:"inline-block"}}/> 停止して解析</>
                : "話して登録"}
          </button>
        </div>
        <div style={{fontSize:11.5,color:"#64748b",lineHeight:1.7}}>
          ① おまかせ：「〇〇マンションで来週月曜から水曜、配管交換、2〜3人」<br/>
          ② ラベル指定（確実）：「<b style={{color:ORANGE}}>現場名</b> サーパス柳ヶ崎 <b style={{color:ORANGE}}>日付</b> 来週月曜 <b style={{color:ORANGE}}>作業内容</b> 配管交換 <b style={{color:ORANGE}}>人数</b> 3人」のように項目名を言ってから内容を話すと、その項目に振り分けます（無料・オフライン対応）
        </div>
        {aiText&&(
          <div style={{marginTop:10,background:"#f8fafc",border:"1px solid #e9edf2",borderRadius:10,padding:"9px 12px",fontSize:13,color:"#334155",lineHeight:1.6,display:"flex",gap:7,alignItems:"flex-start"}}>
            <Mic s={15} c="#94a3b8" w={2.2} style={{marginTop:2}}/><span>{aiText}</span>
          </div>
        )}
        {aiError&&(
          <div style={{marginTop:8,background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"9px 12px",fontSize:12,color:"#dc2626",display:"flex",gap:6,alignItems:"center"}}><Warn s={15} c="#dc2626" w={2.2}/>{aiError}</div>
        )}
        {/* 解析結果プレビュー */}
        {aiPreview&&(
          <div style={{marginTop:10,background:"#fffbf7",border:"1px solid #fed7aa",borderRadius:12,padding:"13px"}}>
            <div style={{fontSize:12.5,color:ORANGE,fontWeight:800,marginBottom:9,display:"flex",alignItems:"center",gap:6}}><Spark s={15} c={ORANGE} w={2}/>解析結果 — 確認して登録</div>
            {[
              {icon:<Pin s={15} c={ORANGE}/>,   label:"現場名", val:aiPreview.siteName},
              {icon:<Users s={15} c={ORANGE}/>, label:"人数",   val:aiPreview.workers},
              {icon:<Cal s={15} c={ORANGE}/>,   label:"日付",   val:aiPreview.dateMode==="候補日"
                ? "候補: "+(aiPreview.candidateDates||[]).filter(Boolean).map(fmtDate).join(" / ")
                : aiPreview.dateFrom?(aiPreview.dateTo?`${fmtDate(aiPreview.dateFrom)}〜${fmtDate(aiPreview.dateTo)}`:`${fmtDate(aiPreview.dateFrom)}〜`):""},
              {icon:<Note s={15} c={ORANGE}/>,  label:"内容",   val:aiPreview.detail},
            ].filter(r=>r.val).map(r=>(
              <div key={r.label} style={{display:"flex",gap:8,marginBottom:6,fontSize:13,alignItems:"center"}}>
                <span style={{color:"#64748b",minWidth:74,flexShrink:0,display:"flex",alignItems:"center",gap:5,fontWeight:700}}>{r.icon}{r.label}</span>
                <span style={{color:"#0f172a",fontWeight:600}}>{r.val}</span>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={applyAiPreview}
                style={{flex:1,background:ORANGE,color:"#fff",border:"none",borderRadius:10,padding:"11px",fontWeight:800,fontSize:13.5,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <Check s={16} c="#fff"/>この内容で登録
              </button>
              <button onClick={()=>{setAiPreview(null);setAiText("");}}
                style={{flex:"0 0 auto",background:"#f1f5f9",color:"#475569",border:"none",borderRadius:10,padding:"11px 16px",fontWeight:800,fontSize:13.5,cursor:"pointer"}}>
                やり直す
              </button>
            </div>
          </div>
        )}
      </div>

      {/* サマリー（ステータス絞り込み） */}
      <div style={{display:"flex",gap:8,padding:"13px 16px 0"}}>
        {STATUSES.map(s=>{
          const sel=filterStatus===s, c=STATUS_COLORS[s];
          return (
            <div key={s} onClick={()=>setFilter(f=>f===s?"全て":s)}
              style={{flex:1,background:"#fff",border:`1.5px solid ${sel?c.dot:"#e9edf2"}`,borderRadius:13,padding:"10px 12px",cursor:"pointer",boxShadow:sel?`0 1px 6px ${c.dot}22`:"none"}}>
              <div style={{fontSize:22,fontWeight:800,color:c.dot,lineHeight:1}}>{counts[s]}</div>
              <div style={{fontSize:11,color:"#475569",marginTop:4,fontWeight:700}}>{s}</div>
            </div>
          );
        })}
      </div>

      {/* タスクリスト */}
      <div style={{padding:"13px 16px 100px"}}>
        {filtered.length===0&&(
          <div style={{textAlign:"center",color:"#94a3b8",padding:"60px 0"}}>
            <Clip s={40} c="#cbd5e1" w={1.8} style={{margin:"0 auto"}}/>
            <div style={{marginTop:10,fontSize:14,fontWeight:600}}>依頼がありません</div>
          </div>
        )}
        {filtered.map(task=>{
          const c=STATUS_COLORS[task.status], done=task.status==="完了", open=detailOpen===task.id;
          return (
            <div key={task.id} style={{background:done?"#fafbfc":"#fff",border:"1px solid #e9edf2",borderLeft:`5px solid ${c.bar}`,borderRadius:15,marginBottom:11,overflow:"hidden",boxShadow:"0 1px 2px rgba(15,23,42,.04)"}}>
              <div onClick={()=>setDetailOpen(open?null:task.id)}
                style={{padding:"14px 15px",cursor:"pointer",display:"flex",alignItems:"flex-start",gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  {task.siteName&&(
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                      <Pin s={16} c="#94a3b8"/>
                      <span style={{fontSize:17,color:done?"#334155":"#0f172a",fontWeight:800,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.siteName}</span>
                    </div>
                  )}
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:7,flexWrap:"wrap"}}>
                    {dateLabel(task)&&(
                      <span style={{display:"flex",alignItems:"center",gap:6,color:done?"#64748b":"#0e7490",fontSize:15,fontWeight:800}}>
                        <Cal s={15} c={done?"#cbd5e1":"#0e7490"}/>{dateLabel(task)}
                      </span>
                    )}
                    {task.workers&&(
                      <span style={{display:"flex",alignItems:"center",gap:5,color:done?"#94a3b8":"#b45309",fontSize:14,fontWeight:700}}>
                        <Users s={15} c={done?"#cbd5e1":"#b45309"}/>{task.workers}
                      </span>
                    )}
                  </div>
                  <div style={{fontWeight:600,fontSize:14,color:task.detail?(done?"#94a3b8":"#64748b"):"#cbd5e1",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.detail||"（作業内容なし）"}</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,flexShrink:0}}>
                  <div style={{background:c.bg,color:c.text,border:`1px solid ${c.border}`,fontSize:12,padding:"4px 10px",borderRadius:999,fontWeight:800,display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                    {done ? <Check s={13} c={c.dot} w={3}/> : <div style={{width:6,height:6,borderRadius:"50%",background:c.dot}}/>}
                    {task.status}
                  </div>
                  {open?<ChevUp s={18} c="#cbd5e1"/>:<ChevDown s={18} c="#cbd5e1"/>}
                </div>
              </div>
              {open&&(
                <div style={{borderTop:"1px solid #eef1f5",padding:"13px 15px",background:"#f8fafc"}}>
                  {task.dateMode==="期間指定"&&task.dateFrom&&(
                    <div style={{fontSize:13,color:"#475569",marginBottom:8,display:"flex",alignItems:"center",gap:6,fontWeight:600}}><Cal s={15} c="#94a3b8"/>期間：{fmtDate(task.dateFrom)}{task.dateTo?`〜${fmtDate(task.dateTo)}`:"〜（未定）"}</div>
                  )}
                  {task.dateMode==="候補日"&&(task.candidateDates||[]).filter(Boolean).length>0&&(
                    <div style={{fontSize:13,color:"#475569",marginBottom:8,display:"flex",alignItems:"center",gap:6,fontWeight:600}}><Cal s={15} c="#94a3b8"/>候補日：{task.candidateDates.filter(Boolean).map(fmtDate).join("　/　")}</div>
                  )}
                  {task.detail&&<div style={{fontSize:14,color:"#334155",marginBottom:13,lineHeight:1.7}}>{task.detail}</div>}
                  <div style={{display:"flex",gap:7,marginBottom:13,flexWrap:"wrap"}}>
                    {STATUSES.map(s=>{
                      const sc=STATUS_COLORS[s], on=task.status===s;
                      return (
                        <button key={s} onClick={()=>handleStatus(task.id,s)}
                          style={{padding:"6px 13px",borderRadius:999,border:"1.5px solid",borderColor:on?sc.dot:"#e2e8f0",background:on?sc.bg:"#fff",color:on?sc.text:"#94a3b8",fontSize:12.5,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap"}}>{s}</button>
                      );
                    })}
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>handleEdit(task)} style={{flex:1,background:"#fff",color:"#475569",border:"1.5px solid #e2e8f0",borderRadius:10,padding:"9px",fontSize:13.5,cursor:"pointer",fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Edit s={15} c="#64748b"/>編集</button>
                    <button onClick={()=>handleDelete(task.id)} style={{flex:1,background:"#fff",color:"#dc2626",border:"1.5px solid #fecaca",borderRadius:10,padding:"9px",fontSize:13.5,cursor:"pointer",fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Trash s={15} c="#dc2626"/>削除</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 手動入力モーダル */}
      {showForm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",zIndex:100,display:"flex",alignItems:"flex-end"}}
          onClick={e=>{if(e.target===e.currentTarget){setShowForm(false);setTranscript("");}}}>
          <div className="modal-sheet" style={{width:"100%",maxWidth:600,margin:"0 auto",background:"#f4f6f8",borderRadius:"22px 22px 0 0",borderBottom:"none",padding:"20px 18px",paddingBottom:"calc(20px + env(safe-area-inset-bottom,0px))",maxHeight:"92vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontWeight:800,fontSize:17,color:"#0f172a",display:"flex",alignItems:"center",gap:7}}>{editId!==null?<><Edit s={18} c={ORANGE}/>依頼を編集</>:<><Plus s={18} c={ORANGE}/>新規依頼</>}</div>
              <button onClick={()=>{setShowForm(false);setTranscript("");}}
                style={{background:"#e9edf2",border:"none",borderRadius:"50%",width:32,height:32,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Close s={16} c="#64748b"/></button>
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <label style={{...LS,marginBottom:0}}><Pin s={16} c={ORANGE}/>現場名</label>
              <MicButton onText={t=>appendF("siteName",t)}/>
            </div>
            <input value={form.siteName} onChange={e=>setF("siteName",e.target.value)} placeholder="例：山田工務店 第1現場" style={{...IS,marginBottom:15}}/>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <label style={{...LS,marginBottom:0}}><Users s={16} c={ORANGE}/>人数</label>
              <MicButton onText={t=>appendF("workers",t)}/>
            </div>
            <input value={form.workers} onChange={e=>setF("workers",e.target.value)} placeholder="例：2〜3人、5人程度、1人" style={{...IS,marginBottom:15}}/>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <label style={{...LS,marginBottom:0}}><Cal s={16} c={ORANGE}/>日付</label>
              <MicButton onText={applyDateSpeech}/>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:12,background:"#eef1f5",borderRadius:11,padding:3}}>
              {DATE_MODES.map(m=>{
                const on=form.dateMode===m;
                return (
                  <button key={m} onClick={()=>setF("dateMode",m)}
                    style={{flex:1,padding:"9px",borderRadius:9,border:"none",background:on?"#fff":"transparent",color:on?"#0f172a":"#64748b",fontSize:14,fontWeight:800,cursor:"pointer",boxShadow:on?"0 1px 2px rgba(15,23,42,.08)":"none"}}>{m}</button>
                );
              })}
            </div>
            {form.dateMode==="期間指定"&&(
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:15}}>
                <input type="date" value={form.dateFrom} onChange={e=>setF("dateFrom",e.target.value)} style={{...IS,flex:1}}/>
                <span style={{color:"#94a3b8",fontSize:14,flexShrink:0,fontWeight:700}}>〜</span>
                <input type="date" value={form.dateTo} onChange={e=>setF("dateTo",e.target.value)} style={{...IS,flex:1}}/>
              </div>
            )}
            {form.dateMode==="候補日"&&(
              <div style={{marginBottom:15}}>
                {(form.candidateDates||[""]).map((d,i)=>(
                  <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                    <span style={{color:"#64748b",fontSize:12,minWidth:28,fontWeight:700}}>第{i+1}</span>
                    <input type="date" value={d} onChange={e=>setCandDate(i,e.target.value)} style={{...IS,flex:1}}/>
                    {(form.candidateDates||[]).length>1&&(
                      <button onClick={()=>rmCandDate(i)} style={{background:"#fff",border:"1.5px solid #fecaca",color:"#dc2626",borderRadius:9,padding:"9px 11px",cursor:"pointer",display:"flex",alignItems:"center"}}><Close s={14} c="#dc2626"/></button>
                    )}
                  </div>
                ))}
                <button onClick={addCandDate} style={{background:"#fff",border:"1.5px dashed #cbd5e1",borderRadius:10,color:"#475569",padding:"9px 14px",fontSize:13.5,cursor:"pointer",width:"100%",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Plus s={15} c="#64748b"/>候補日を追加</button>
              </div>
            )}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
              <label style={{...LS,marginBottom:0}}><Note s={16} c={ORANGE}/>作業内容・メモ</label>
              <button onClick={recording?stopRec:startRec}
                style={{background:recording?"#fef2f2":"#fff7ed",border:`1.5px solid ${recording?"#fca5a5":"#fdba74"}`,borderRadius:999,padding:"5px 12px",color:recording?"#dc2626":ORANGE,fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                {recording
                  ? <><span style={{width:8,height:8,borderRadius:"50%",background:"#dc2626",animation:"pulse 1s infinite",display:"inline-block"}}/>停止</>
                  : <><Mic s={13} c={ORANGE} w={2.2}/>音声</>}
              </button>
            </div>
            {transcript&&<div style={{background:"#f8fafc",border:"1px solid #e9edf2",borderRadius:10,padding:"9px 12px",marginBottom:8,fontSize:13,color:"#334155",display:"flex",gap:7,alignItems:"flex-start"}}><Mic s={15} c="#94a3b8" w={2.2} style={{marginTop:2}}/><span>{transcript}</span></div>}
            {recError&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"9px 12px",marginBottom:8,fontSize:12,color:"#dc2626",display:"flex",gap:6,alignItems:"center"}}><Warn s={15} c="#dc2626" w={2.2}/>{recError}</div>}
            <textarea value={form.detail} onChange={e=>setF("detail",e.target.value)} placeholder="作業内容の詳細" rows={3}
              style={{...IS,marginBottom:18,resize:"vertical"}}/>

            <button onClick={handleSubmit} disabled={!canSubmit}
              style={{width:"100%",background:canSubmit?ORANGE:"#e2e8f0",color:canSubmit?"#fff":"#94a3b8",border:"none",borderRadius:13,padding:"15px",fontWeight:800,fontSize:16,cursor:canSubmit?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <Check s={18} c={canSubmit?"#fff":"#94a3b8"}/>{editId!==null?"更新する":"依頼を追加"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
